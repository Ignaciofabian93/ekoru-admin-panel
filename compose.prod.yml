name: "ekoru-admin-panel"

services:
  ekoru-admin-panel:
    image: ekoru-admin-panel
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined at build time, so the target environment must
      # be passed as a build arg (not just via env_file, which is runtime only).
      args:
        NEXT_PUBLIC_ENVIRONMENT: production
    restart: always
    container_name: ekoru-admin-panel
    env_file:
      - .env.prod
    ports:
      - "9000:3000"
    networks:
      - ekoru-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s

networks:
  ekoru-network:
    external: true
